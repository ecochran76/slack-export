_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: ${SLACK_APP_NAME:-slack-mirror}
  description: ${SLACK_APP_DESCRIPTION:-Private slack-mirror app}
  background_color: "#1D9BF0"

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: true
  bot_user:
    display_name: ${SLACK_BOT_DISPLAY_NAME:-slack-mirror}
    always_online: false
  slash_commands: []

oauth_config:
  redirect_urls:
    - ${SLACK_REDIRECT_URL:-https://localhost:3000/slack/oauth/callback}
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read
    user:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - search:read.public
      - search:read.mpim
      - users:read

settings:
  event_subscriptions:
    request_url: ${SLACK_EVENTS_URL:-https://example.invalid/slack/events}
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
